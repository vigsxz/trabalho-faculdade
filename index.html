<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barbearia do João</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="bg-black text-white text-center p-4">
  <h1>Barbearia do João</h1>
</header>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <div class="navbar-nav mx-auto">
      <a class="nav-link" href="#servicos">Serviços</a>
      <a class="nav-link" href="#contato">Contato</a>
    </div>
  </div>
</nav>

<main class="container my-5">

  <!-- SERVIÇOS -->
  <section id="servicos" class="mb-5">
    <h2 class="titulo-secao">Serviços</h2>

    <div class="row mt-4">

      <div class="col-md-4">
        <div class="card bg-dark text-white">
          <img src="img/corte.png" class="card-img-top" alt="Corte de cabelo">
          <div class="card-body">
            <h5 class="card-title">Corte de cabelo</h5>
            <p class="card-text">R$30</p>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card bg-dark text-white">
          <img src="img/barba.png" class="card-img-top" alt="Barba">
          <div class="card-body">
            <h5 class="card-title">Barba</h5>
            <p class="card-text">R$20</p>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card bg-dark text-white">
          <img src="img/combo.png" class="card-img-top" alt="Corte e barba">
          <div class="card-body">
            <h5 class="card-title">Corte + Barba</h5>
            <p class="card-text">R$45</p>
          </div>
        </div>
      </div>

    </div>
  </section>

  <!-- CONTATO -->
  <section id="contato">
    <h2 class="titulo-secao">Contato</h2>

    <button class="btn btn-warning mt-3" onclick="mostrarMensagem()">
      Agendar horário
    </button>

    <p id="mensagem" class="mt-3"></p>
  </section>

</main>

<footer class="bg-black text-white text-center p-3">
  <p>© 2026 Barbearia do João</p>
</footer>

<script src="js/script.js"></script>
</body>
</html>
